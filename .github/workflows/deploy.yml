name: Encrypt and deploy pharma-offer-calculator tools

# Triggers: ajetaan kun dev/-kansion HTML tai index muuttuu
on:
  push:
    branches: [main]
    paths:
      - "pharma-offer-calculator/dev/**/*.html"
      - "pharma-offer-calculator/index.html"
      - "pharma-offer-calculator/encrypt-tool.py"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:  # voi käynnistää myös käsin GitHub UI:sta

jobs:
  encrypt:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # tarvitaan jotta workflow voi committaa salatut tiedostot
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cryptography

      - name: Encrypt all dev/*.html files
        env:
          MENESTYS_PASSWORD: ${{ secrets.MENESTYS_PASSWORD }}
        working-directory: pharma-offer-calculator
        run: |
          set -e
          # Käy läpi kaikki dev/*.html ja salaa
          for src in dev/*.html; do
            [ -e "$src" ] || continue
            slug=$(basename "$src" .html)
            title=$(grep -oP '(?<=<title>)[^<]+' "$src" | head -1 || echo "$slug")
            desc=$(grep -oP '(?<=name="description" content=")[^"]+' "$src" | head -1 || echo "")
            echo "→ encrypt $slug"
            python3 encrypt-tool.py "$src" "$slug" "$title" "$desc"
          done

      - name: Commit encrypted tools/ if changed
        run: |
          cd pharma-offer-calculator
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/
          if git diff --cached --quiet; then
            echo "Ei muutoksia tools/-kansiossa, skip commit"
          else
            git commit -m "chore(pharma): auto-encrypt tools/ from dev/ [skip ci]"
            git push
          fi
