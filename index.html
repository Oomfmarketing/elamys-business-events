<html lang="fi">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B&amp;E Seuranta – Kirjautuminen</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    color: #1f2937;
  }
  .gate {
    background: white; padding: 36px 32px; border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25); width: 100%; max-width: 380px;
    text-align: center;
  }
  .gate h1 { margin: 0 0 6px 0; font-size: 20px; }
  .gate p { margin: 0 0 22px 0; color: #6b7280; font-size: 13px; }
  .gate input {
    width: 100%; padding: 12px 14px; font-size: 15px; font-family: inherit;
    border: 1px solid #d1d5db; border-radius: 8px; outline: none; margin-bottom: 12px;
  }
  .gate input:focus { border-color: #1e40af; box-shadow: 0 0 0 3px rgba(30,64,175,0.12); }
  .gate button {
    width: 100%; padding: 12px; background: #1e40af; color: white; border: none;
    border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .gate button:hover { background: #1e3a8a; }
  .gate button:disabled { background: #9ca3af; cursor: not-allowed; }
  .err { color: #dc2626; font-size: 13px; margin-top: 10px; min-height: 18px; }
  .lock-icon {
    width: 48px; height: 48px; margin: 0 auto 14px; background: #eff6ff; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .lock-icon svg { width: 22px; height: 22px; stroke: #1e40af; }
</style>
</head>

<div class="gate" id="gate">
  <div class="lock-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

    </svg>
  </div>

  <p>Tämä sisältö on salasanasuojattu. Anna salasana jatkaaksesi.</p>

    <button type="submit" id="btn">Avaa</button>
    <div class="err" id="err"></div>
  </form>
</div>

const ITER = 100000;

function b64ToBytes(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: ITER, hash: "SHA-256" },
    baseKey,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function tryDecrypt(password) {
  const salt = b64ToBytes(SALT_B64);
  const nonce = b64ToBytes(NONCE_B64);
  const ct = b64ToBytes(CT_B64);
  const key = await deriveKey(password, salt);
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: nonce }, key, ct);
  return new TextDecoder().decode(plain);
}

document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("btn");
  const err = document.getElementById("err");
  const pw = document.getElementById("pw").value;
  btn.disabled = true; btn.textContent = "Avataan…"; err.textContent = "";
  try {
    const html = await tryDecrypt(pw);
    try { sessionStorage.setItem("be_pw", pw); } catch (_) {}
    document.open(); document.write(html); document.close();
  } catch (ex) {
    err.textContent = "Väärä salasana.";
    btn.disabled = false; btn.textContent = "Avaa";
    document.getElementById("pw").select();
  }
});

(async () => {
  try {
    const cached = sessionStorage.getItem("be_pw");
    if (cached) {
      const html = await tryDecrypt(cached);
      document.open(); document.write(html); document.close();
    }
  } catch (_) { /* invalid cached pw, ignore */ }
})();
</script>
