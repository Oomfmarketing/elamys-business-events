<!DOCTYPE html><html lang="fi"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elämys Internal Tools</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg, #1E3A8A 0%, #1E40AF 100%);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; color:#1f2937; }
  .container { width:100%; max-width:520px; padding:24px; }
  .card { background:white; padding:36px 32px; border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,0.25); }
  .lock-icon { width:48px; height:48px; margin:0 auto 14px; background:#eff6ff; border-radius:50%; display:flex; align-items:center; justify-content:center; }
  .lock-icon svg { width:22px; height:22px; stroke:#1E40AF; }
  h1 { margin:0 0 6px 0; font-size:22px; text-align:center; }
  .sub { margin:0 0 22px 0; color:#6b7280; font-size:13px; text-align:center; }
  input { width:100%; padding:12px 14px; font-size:15px; font-family:inherit; border:1px solid #d1d5db; border-radius:8px; outline:none; margin-bottom:12px; }
  input:focus { border-color:#1E40AF; box-shadow:0 0 0 3px rgba(30,64,175,0.12); }
  button.primary { width:100%; padding:12px; background:#1E40AF; color:white; border:none; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; }
  button.primary:hover { background:#1E3A8A; }
  button.primary:disabled { background:#9ca3af; cursor:not-allowed; }
  .err { color:#dc2626; font-size:13px; margin-top:10px; min-height:18px; text-align:center; }
  .picker { display:none; gap:14px; flex-direction:column; }
  .picker.show { display:flex; }
  .picker h2 { margin:0 0 8px 0; font-size:18px; }
  .tool-card { display:flex; gap:16px; padding:18px; border-radius:12px; background:#f9fafb; border:1px solid #e5e7eb; text-decoration:none; color:inherit; transition:all 0.15s; cursor:pointer; }
  .tool-card:hover { background:#eff6ff; border-color:#1E40AF; transform:translateY(-1px); }
  .tool-icon { width:48px; height:48px; flex-shrink:0; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; color:white; }
  .tool-icon.primary { background:#1E40AF; }
  .tool-icon.success { background:#059669; }
  .tool-icon.warn { background:#d97706; }
  .tool-title { font-weight:600; font-size:15px; margin-bottom:2px; }
  .tool-desc { font-size:12px; color:#6b7280; }
  .form.hide { display:none; }
  .footer { margin-top:18px; text-align:center; font-size:11px; color:#9ca3af; }
  .lock-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .lock-row button { background:transparent; border:1px solid #d1d5db; color:#6b7280; padding:5px 10px; border-radius:6px; cursor:pointer; font-size:12px; font-family:inherit; }
  .lock-row button:hover { background:#f3f4f6; }
</style></head>
<body>
<div class="container">
  <div class="card">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1>Elämys Internal Tools</h1>
    <p class="sub">Sisäinen työkalupakki. Anna salasana jatkaaksesi.</p>

    <form class="form" id="loginForm" autocomplete="off">
      <input type="password" id="pw" placeholder="Salasana" autofocus required>
      <button type="submit" class="primary" id="btn">Avaa</button>
      <div class="err" id="err"></div>
    </form>

    <div class="picker" id="picker">
      <div class="lock-row">
        <h2>Valitse työkalu</h2>
        <button onclick="lockOut()">🔒 Lukitse</button>
      </div>
      <a href="/esimerkki" class="tool-card">
        <div class="tool-icon primary">E</div>
        <div>
          <div class="tool-title">Esimerkki — tämä on placeholder</div>
          <div class="tool-desc">Voit korvata tämän omalla työkalulla ajamalla encrypt-tool.py:tä.</div>
        </div>
      </a>
    </div>
    <div class="footer">Internal · sisäinen käyttö</div>
  </div>
</div>
<script>
const S = "XAXVYnZl7g3495xKTaZkIQ==", N = "vlH+N6s4uYs5nqgs", C = "Lqb2DTLTubUj0ywybIhKWoQP3ELIBmgBy2HEEtom", ITER = 100000;
const ALLOWED = ["/esimerkki", "/esimerkki.html"];

function b(x) { const s=atob(x); const a=new Uint8Array(s.length); for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i); return a; }
async function dk(p, salt) {
  const k = await crypto.subtle.importKey("raw", new TextEncoder().encode(p), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({ name:"PBKDF2", salt, iterations:ITER, hash:"SHA-256" }, k, { name:"AES-GCM", length:256 }, false, ["decrypt"]);
}
async function verify(p) {
  const key = await dk(p, b(S));
  const plain = await crypto.subtle.decrypt({ name:"AES-GCM", iv:b(N) }, key, b(C));
  return new TextDecoder().decode(plain) === "OK-AUTH-CANARY";
}

function showPicker() {
  document.getElementById("loginForm").classList.add("hide");
  document.getElementById("picker").classList.add("show");
  const params = new URLSearchParams(location.search);
  const ret = params.get("return");
  if (ret && ALLOWED.includes(ret)) location.href = ret;
}

window.lockOut = function() {
  sessionStorage.removeItem("tools_pw");
  location.href = "/";
};

document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("btn"), err = document.getElementById("err");
  const pw = document.getElementById("pw").value;
  btn.disabled = true; btn.textContent = "Tarkistetaan…"; err.textContent = "";
  try {
    if (await verify(pw)) {
      sessionStorage.setItem("tools_pw", pw);
      showPicker();
    } else { throw new Error("bad"); }
  } catch (e) {
    err.textContent = "Väärä salasana.";
    btn.disabled = false; btn.textContent = "Avaa";
    document.getElementById("pw").select();
  }
});

(async () => {
  const cached = sessionStorage.getItem("tools_pw");
  if (cached) {
    try { if (await verify(cached)) showPicker(); else sessionStorage.removeItem("tools_pw"); }
    catch (_) { sessionStorage.removeItem("tools_pw"); }
  }
  const params = new URLSearchParams(location.search);
  if (params.get("error")) document.getElementById("err").textContent = "Istunto vanhentui. Kirjaudu uudelleen.";
})();
</script>
</body></html>
